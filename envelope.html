<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Envelope</title>
    <link rel="stylesheet" href="envelope.css">
</head>
<body>

    <div class="container">

        <h1 class="title">Click Me To Open ✨</h1>

        <input type="checkbox" id="open-envelope">

        <label for="open-envelope" class="envelope">

            <div class="flap"></div>

            <div class="letter">
                <h2>Open Me 💌</h2>
            </div>

        </label>
        
        <a href="letter.html" class="continue-btn">
            Continue
        </a>

    </div>

</body>
</html>
